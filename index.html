  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <h1>Story of My Life</h1> 
      <p>A Gacha Voice Acting Project</p>
    </header>

    <nav class="tab-nav">
      <button class="tab-btn active" onclick="showTab('about')">About</button>
      <button class="tab-btn" onclick="showTab('characters')">Main Characters</button>
      <button class="tab-btn" onclick="showTab('fanart')">Fanart</button>
      <button class="tab-btn" onclick="showTab('credits')">Credits</button>
      <button class="tab-btn" onclick="showTab('support')">Support</button>
    </nav>

    <section id="about" class="tab-section" style="display:block;">
      <h2>About the Project</h2>
      <p>Your project description here...</p>
    </section>

    <section id="characters" class="tab-section" style="display:none;">
      <h2>Main Characters</h2>
      <p>Character info here...</p>
    </section>

    <section id="fanart" class="tab-section" style="display:none;">
      <h2>Fanart</h2>
      <p>Fanart gallery here...</p>
    </section>

    <section id="credits" class="tab-section" style="display:none;">
      <h2>Credits</h2>
      <p>Project by HinaStudiosss and contributors.</p>
    </section>

    <section id="support" class="tab-section" style="display:none;">
      <h2>Support the Project</h2>
      <a class="button" href="#">Donate Here</a>
    </section>

    <!-- Comments Section -->
    <section id="comments-section" class="tab-section">
      <h2>Comments</h2>

      <!-- Login -->
      <div id="comment-login">
        <button id="discord-login-btn" class="button">Login with Discord</button>
      </div>

      <!-- Logged-in user info -->
      <div id="comment-user" style="display:none;">
        <img id="comment-avatar" src="" alt="avatar" style="width:32px;height:32px;border-radius:50%;margin-right:8px;">
        <span id="comment-username"></span>
        <button id="logout-btn" class="button">Logout</button>
      </div>

      <!-- Comment form -->
      <form id="comment-form" style="display:none;">
        <textarea id="comment-input" rows="3" placeholder="Write a comment..." style="width:100%;padding:10px;border-radius:8px;"></textarea>
        <input type="hidden" id="parent-id" value="">
        <button type="submit" class="button">Post</button>
      </form>

      <!-- Comments list -->
      <div id="comments-list"></div>
    </section>

  </div>
