<script>
  // --- API base setup ---
  const API_BASE = window.location.hostname === 'localhost' 
  ? 'http://localhost:3001' 
  : 'https://gacha-project-site.onrender.com';

  let currentUser = null;

  function escapeHTML(str) {
    return str.replace(/[&<>"']/g, function(tag) {
      const chars = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'};
      return chars[tag] || tag;
    });
  }

  // --- Render comments recursively ---
  function renderComments(comments, parentId = null, level = 0) {
    let html = '';
    comments.filter(c => c.parent_id == parentId).forEach(c => {
      html += `<div class="comment" style="margin-left:${level*24}px;margin-bottom:12px;">
        <img src="https://cdn.discordapp.com/avatars/${c.user_id}/${c.avatar}.png" alt="avatar" style="width:28px;height:28px;border-radius:50%;vertical-align:middle;margin-right:8px;">
        <b>${escapeHTML(c.username)}</b>
        <span style="color:#888;font-size:0.9em;margin-left:8px;">${new Date(c.created_at).toLocaleString()}</span><br>
        <span>${escapeHTML(c.content)}</span>
        <div>` + (currentUser ? `<button class="reply-btn button" data-id="${c.id}" style="margin-top:4px;padding:2px 10px;font-size:0.9em;">Reply</button>` : '') + `</div>
      </div>`;
      html += renderComments(comments, c.id, level + 1);
    });
    return html;
  }

  // --- Load comments from backend ---
  function loadComments() {
    fetch(`${API_BASE}/api/comments`, { credentials: 'include' })
      .then(r => r.json())
      .then(comments => {
        document.getElementById('comments-list').innerHTML = renderComments(comments);
        document.querySelectorAll('.reply-btn').forEach(btn => {
          btn.onclick = function() {
            document.getElementById('parent-id').value = btn.getAttribute('data-id');
            document.getElementById('comment-input').focus();
          };
        });
      });
  }

  // --- Check if user is logged in ---
  function checkAuth() {
    fetch(`${API_BASE}/auth/user`, { credentials: 'include' })
      .then(r => r.json())
      .then(data => {
        if (data.user) {
          currentUser = data.user;
          document.getElementById('comment-login').style.display = 'none';
          document.getElementById('comment-user').style.display = '';
          document.getElementById('comment-form').style.display = '';
          document.getElementById('comment-avatar').src = `https://cdn.discordapp.com/avatars/${data.user.id}/${data.user.avatar}.png`;
          document.getElementById('comment-username').textContent = data.user.username;
        } else {
          currentUser = null;
          document.getElementById('comment-login').style.display = '';
          document.getElementById('comment-user').style.display = 'none';
          document.getElementById('comment-form').style.display = 'none';
        }
      });
  }

  // --- Login with Discord ---
  document.getElementById('discord-login-btn').onclick = function() {
    window.location.href = `${API_BASE}/auth/discord`;
  };

  // --- Logout ---
  document.getElementById('logout-btn').onclick = function() {
    fetch(`${API_BASE}/auth/logout`, { credentials: 'include' })
      .then(() => { 
        checkAuth(); 
        loadComments(); 
      });
  };

  // --- Submit new comment ---
  document.getElementById('comment-form').onsubmit = function(e) {
    e.preventDefault();
    const content = document.getElementById('comment-input').value.trim();
    const parent_id = document.getElementById('parent-id').value || null;
    if (!content) return;

    fetch(`${API_BASE}/api/comments`, {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content, parent_id })
    })
    .then(r => r.json())
    .then(() => {
      document.getElementById('comment-input').value = '';
      document.getElementById('parent-id').value = '';
      loadComments();
    });
  };

  // --- Initial load ---
  checkAuth();
  loadComments();

  // --- Tab navigation and FAQ (your existing code) ---
  function showTab(tabId) {
    document.querySelectorAll('.tab-section').forEach(s => s.style.display = 'none');
    document.getElementById(tabId).style.display = 'block';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const btns = document.querySelectorAll('.tab-btn');
    if(tabId === 'about') btns[0].classList.add('active');
    if(tabId === 'characters') btns[1].classList.add('active');
    if(tabId === 'fanart') btns[2].classList.add('active');
    if(tabId === 'credits') btns[3].classList.add('active');
    if(tabId === 'support') btns[4].classList.add('active');
  }

  document.addEventListener('DOMContentLoaded', function() {
    var faqAnswers = document.querySelectorAll('.faq-answer');
    var faqQuestions = document.querySelectorAll('.faq-question');
    faqAnswers.forEach(function(a) { a.style.maxHeight = '0'; a.style.marginTop = '0'; });
    faqQuestions.forEach(function(btn) {
      btn.addEventListener('click', function() {
        const answer = btn.nextElementSibling;
        const arrow = btn.querySelector('.arrow');
        const isOpen = answer.style.maxHeight && answer.style.maxHeight !== '0px';
        faqAnswers.forEach(function(a, i) {
          a.style.maxHeight = '0';
          a.style.marginTop = '0';
          faqQuestions[i].querySelector('.arrow').classList.remove('open');
        });
        if (!isOpen) {
          answer.style.maxHeight = answer.scrollHeight + 'px';
          answer.style.marginTop = '12px';
          arrow.classList.add('open');
        }
      });
    });
  });
</script>
